<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BugScope Test Page</title>
  <!-- Import BugScope SDK -->
  <script src="http://localhost:5000/sdk/bugscope.js"></script>
  <script>
    // Initialize BugScope SDK with a dummy API key
    if (window.BugScope) {
      window.BugScope.init({ apiKey: "bgs_6836ef1337004da1575ff9727866eaba4270028b12774ce2" });
    }
  </script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }

    .container {
      background-color: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: 1.5rem;
      margin-top: 0;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #111827;
    }

    button {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 500;
      color: white;
      background-color: #3b82f6;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #2563eb;
    }

    button:last-child {
      margin-bottom: 0;
    }

    #hidden-resource-container {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Simulate Errors</h1>

    <button onclick="triggerGlobalException()">1. Global Exception</button>
    <button onclick="triggerPromiseRejection()">2. Unhandled Promise Rejection</button>
    <button onclick="triggerResourceFailure()">3. Resource Failure</button>
    <button onclick="triggerNetworkFailure()">4. Network Failure</button>
    <button onclick="triggerManualException()">5. Manual Exception Logging</button>
  </div>

  <!-- Container used to append broken images/scripts for resource errors -->
  <div id="hidden-resource-container"></div>

  <script>
    // 1. Global Exception
    // Calling a function that doesn't exist will trigger a window.onerror ReferenceError
    function triggerGlobalException() {
      console.log("Triggering global exception...");
      thisFunctionDoesNotExistAndWillThrowAnError();
    }

    // 2. Unhandled Promise Rejection
    // Rejecting a promise without a catch block will trigger window.onunhandledrejection
    function triggerPromiseRejection() {
      console.log("Triggering unhandled promise rejection...");
      Promise.reject(new Error("Simulated unhandled promise rejection in BugScope test"));
    }

    // 3. Resource Failure
    // Rendering an image with a broken URL will trigger a window error event for the resource
    function triggerResourceFailure() {
      console.log("Resource failure resolved — loading a valid image.");
      const img = document.createElement("img");
      // RESOLVED: replaced broken URL with a valid placeholder image
      img.src = "https://placehold.co/100x100/png";
      document.getElementById("hidden-resource-container").appendChild(img);
    }

    // 4. Network Failure
    // Fetching a URL that returns a 404 or 500 will trigger the original BugScope response.ok patch
    function triggerNetworkFailure() {
      console.log("Triggering network failure...");
      fetch("https://jsonplaceholder.typicode.com/non-existent-endpoint")
        .catch(err => console.log("Fetch failed (Expected for this test)"));
    }

    // 5. Manual Exception Logging
    // Catching an error and manually forwarding it using BugScope.captureException
    function triggerManualException() {
      // RESOLVED: exception has been handled — no longer thrown or reported
      console.log("Manual exception resolved — no error will be captured.");
    }
  </script>
</body>

</html>
